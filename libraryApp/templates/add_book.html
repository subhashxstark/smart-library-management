<!DOCTYPE html>
<html>
<head>
    <!-- Page title shown in browser tab -->
    <title>Add Book</title>

    <style>

        /* Apply box-sizing to all elements for better layout control */
        * {
            box-sizing: border-box;
        }

        /* Body styling */
        body {
            font-family: Arial;           /* Font style */
            margin: 40px;                 /* Outer spacing */
            background-color: #f4f4f4;    /* Light background color */
        }

        /* Main container box */
        .container {
            background: white;            /* White background for form */
            padding: 50px;                /* Inner spacing */
            border-radius: 0;             /* No rounded corners */
            width: 400px;                 /* Fixed width */
            margin: 70px auto;            /* Center horizontally */
            border: 2px solid #ccc;       /* Light border */
        }

        /* Heading style */
        h2 {
            text-align: center;           /* Center align heading */
        }

        /* Input fields and button styling */
        input, button {
            width: 100%;                  /* Full width */
            padding: 12px;                /* Space inside */
            margin-top: 12px;             /* Space between elements */
            border: 1px solid #ccc        /* Border style */
        }

        /* Button specific style */
        button {
            background-color: blue;       /* Button color */
            color: white;                /* Text color */
            border: none;                /* Remove border */
            border-radius: 0;            /* No rounded edges */
            cursor: pointer;             /* Pointer cursor on hover */
        }

        /* Hover effect for button */
        button:hover {
            opacity: 0.9;                /* Slight fade effect */
        }

        /* Back link styling */
        a {
            display: block;              /* Takes full width */
            text-align: center;          /* Center text */
            margin-top: 15px;            /* Space above link */
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Page heading -->
    <h2>➕ Add Book</h2>

    <!-- Form to add new book -->
    <form method="post">
        
        <!-- CSRF token for security (required in Django forms) -->
        {% csrf_token %}

        <!-- Input field for book title -->
        <input type="text" name="title" placeholder="Book Title" required>

        <!-- Input field for author name -->
        <input type="text" name="author" placeholder="Author Name" required>

        <!-- Submit button -->
        <button type="submit">Add Book</button>
    </form>

    <!-- Link to go back to homepage -->
    <a href="/" style="text-decoration: None;">🏠 Back to Home</a>

</div>

</body>
</html>
